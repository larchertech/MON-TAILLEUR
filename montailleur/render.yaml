services:
  # Laravel API
  - type: web
    name: montailleur-api
    runtime: docker
    repo: https://github.com/your-org/montailleur
    branch: main
    dockerfilePath: ./backend-laravel/Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://montailleur-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: montailleur-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: montailleur-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: montailleur-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: montailleur-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: montailleur-db
          property: password
      - key: REDIS_HOST
        fromService:
          type: redis
          name: montailleur-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: montailleur-redis
          property: port
      - key: JWT_SECRET
        generateValue: true
      - key: CINETPAY_API_KEY
        sync: false
      - key: CINETPAY_SITE_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: FIREBASE_SERVER_KEY
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false

  # Python AI Service
  - type: web
    name: montailleur-ai
    runtime: docker
    repo: https://github.com/your-org/montailleur
    branch: main
    dockerfilePath: ./python-ai/Dockerfile
    envVars:
      - key: PORT
        value: 8000

  # Redis
  - type: redis
    name: montailleur-redis
    ipAllowList: []

databases:
  - name: montailleur-db
    databaseName: montailleur
    user: montailleur
    plan: standard
