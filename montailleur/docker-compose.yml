version: '3.8'

services:
  # Laravel API
  api:
    build:
      context: ./backend-laravel
      dockerfile: Dockerfile
    container_name: montailleur-api
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend-laravel:/var/www
      - ./backend-laravel/storage:/var/www/storage
    networks:
      - montailleur-network
    depends_on:
      - db
      - redis
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=pgsql
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=montailleur
      - DB_USERNAME=postgres
      - DB_PASSWORD=secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: montailleur-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./backend-laravel:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - montailleur-network
    depends_on:
      - api

  # Python AI Service
  ai-service:
    build:
      context: ./python-ai
      dockerfile: Dockerfile
    container_name: montailleur-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./python-ai:/app
    networks:
      - montailleur-network
    environment:
      - PYTHONUNBUFFERED=1

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: montailleur-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=montailleur
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=secret
    networks:
      - montailleur-network

  # Redis
  redis:
    image: redis:7-alpine
    container_name: montailleur-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - montailleur-network

  # Queue Worker
  queue:
    build:
      context: ./backend-laravel
      dockerfile: Dockerfile
    container_name: montailleur-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work --sleep=3 --tries=3
    volumes:
      - ./backend-laravel:/var/www
    networks:
      - montailleur-network
    depends_on:
      - db
      - redis

  # Scheduler
  scheduler:
    build:
      context: ./backend-laravel
      dockerfile: Dockerfile
    container_name: montailleur-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan schedule:work
    volumes:
      - ./backend-laravel:/var/www
    networks:
      - montailleur-network
    depends_on:
      - db

volumes:
  postgres-data:

networks:
  montailleur-network:
    driver: bridge
